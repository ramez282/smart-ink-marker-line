services:
  influxdb:
    image: influxdb:2
    container_name: smart-ink-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-smart-ink-password}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-university}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-production_line}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-smart-ink-token}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping", "--host", "http://localhost:8086"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:11.4.0
    container_name: smart-ink-grafana
    depends_on:
      influxdb:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-smart-ink-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-university}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-production_line}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  backend:
    build:
      context: ./backend
    container_name: smart-ink-backend
    depends_on:
      influxdb:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: docker
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-smart-ink-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-university}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-production_line}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: smart-ink-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  influxdb-data:
